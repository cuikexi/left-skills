name: publish

# 触发:push tag v* → CI 自动 build + npm publish(OIDC Trusted Publishing,无 NPM_TOKEN)+ GitHub release
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # OIDC Trusted Publishing 必需
  contents: write  # 建 GitHub release 需要

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public  # OIDC 自动认证,无 NPM_TOKEN;provenance 自动
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
