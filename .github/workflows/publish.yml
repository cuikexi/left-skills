name: publish

# 触发:push tag v* → CI 自动 build + npm publish(OIDC Trusted Publishing,无 NPM_TOKEN)+ GitHub release
# 要 npm 11.5.1+(Trusted Publishing),node 24 装 npm 11
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # OIDC Trusted Publishing 必需
  contents: write  # 建 GitHub release 需要

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: npm publish(OIDC Trusted Publishing)
        run: |
          # unset token + 删 .npmrc _authToken,确保 npm 走 OIDC(不 fallback token)
          unset NODE_AUTH_TOKEN
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" || true
          npm publish --access public
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
