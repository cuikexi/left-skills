name: publish

# 触发:push tag v* → CI 自动 build + npm publish(OIDC Trusted Publishing)+ GitHub release
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # OIDC Trusted Publishing 必需
  contents: write  # 建 GitHub release 需要

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build

      - name: Debug env(看 NODE_AUTH_TOKEN / OIDC)
        run: |
          echo "=== env (token 相关) ==="
          env | grep -i token || echo "(无 token env)"
          echo "=== .npmrc (NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG) ==="
          cat "$NPM_CONFIG_USERCONFIG" || echo "(无 .npmrc)"

      - name: npm publish(强制 OIDC:unset token + 删 .npmrc _authToken)
        run: |
          unset NODE_AUTH_TOKEN
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" || true
          echo "=== .npmrc(删 _authToken 后) ==="
          cat "$NPM_CONFIG_USERCONFIG"
          echo "=== NODE_AUTH_TOKEN(应空): ${NODE_AUTH_TOKEN:-<empty>} ==="
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
